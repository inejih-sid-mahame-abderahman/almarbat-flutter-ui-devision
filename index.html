        }

                <h3 class="text-2xl font-black mt-2">${phaseStats.phase2}</h3>
                <p class="font-bold text-amber-800">⚙️ المرحلة 2 : Acheteur + Vendeur + Préparateur</p>
                <p class="text-xs text-slate-500">قلب التطبيق (الشراء، البيع، التجهيز)</p>
            </div>
            <div class="bg-white rounded-2xl shadow-md p-5 text-center border-r-8 border-sky-500">
                <i class="fa-solid fa-truck-fast text-4xl text-sky-600"></i>
                <h3 class="text-2xl font-black mt-2">${phaseStats.phase3}</h3>
                <p class="font-bold text-sky-800">🚀 المرحلة 3 : Livreur + Admin Web كامل</p>
                <p class="text-xs text-slate-500">منصة التوصيل + لوحة التحكم المتقدمة (Next.js)</p>
            </div>
        `;
    }
    
    // أزرار الفلتر حسب المطور + المراحل
    function renderFilters() {
        const teamDiv = document.getElementById("quickFilterTeam");
        teamDiv.innerHTML = `
            <button class="px-5 py-2 rounded-full font-bold transition-all ${currentTeamFilter==='all' ? 'bg-emerald-700 text-white shadow-lg' : 'bg-white border text-slate-700'}" onclick="setTeamFilter('all')">👥 جميع المطورين</button>
            <button class="px-5 py-2 rounded-full font-bold transition-all ${currentTeamFilter==='Inejih' ? 'bg-emerald-700 text-white shadow-lg' : 'bg-white border text-slate-700'}" onclick="setTeamFilter('Inejih')">🧑‍💻 Inejih (15 شاشة)</button>
            <button class="px-5 py-2 rounded-full font-bold transition-all ${currentTeamFilter==='Cheick Hama' ? 'bg-emerald-700 text-white shadow-lg' : 'bg-white border text-slate-700'}" onclick="setTeamFilter('Cheick Hama')">👳 Cheick Hama (15)</button>
            <button class="px-5 py-2 rounded-full font-bold transition-all ${currentTeamFilter==='Ahmetou' ? 'bg-emerald-700 text-white shadow-lg' : 'bg-white border text-slate-700'}" onclick="setTeamFilter('Ahmetou')">🧔 Ahmetou (15)</button>
        `;
        const phaseDiv = document.getElementById("phaseFilterButtons");
        phaseDiv.innerHTML = `
            <button class="text-sm px-5 py-2 rounded-full font-bold ${currentPhaseFilter==='all' ? 'bg-slate-800 text-white' : 'bg-white border'}" onclick="setPhaseFilter('all')">📱 جميع المراحل</button>
            <button class="text-sm px-5 py-2 rounded-full font-bold ${currentPhaseFilter==='phase1' ? 'bg-emerald-600 text-white' : 'bg-white border'}" onclick="setPhaseFilter('phase1')">✨ المرحلة 1 (Splash/Auth)</button>
            <button class="text-sm px-5 py-2 rounded-full font-bold ${currentPhaseFilter==='phase2' ? 'bg-amber-600 text-white' : 'bg-white border'}" onclick="setPhaseFilter('phase2')">⚙️ المرحلة 2 (Acheteur/Vendeur/Préparateur)</button>
            <button class="text-sm px-5 py-2 rounded-full font-bold ${currentPhaseFilter==='phase3' ? 'bg-sky-600 text-white' : 'bg-white border'}" onclick="setPhaseFilter('phase3')">🚀 المرحلة 3 (Livreur + Admin Web)</button>
        `;
    }
    
    function setTeamFilter(team) {
        currentTeamFilter = team;
        renderFilters();
        renderScreens();
    }
    
    function setPhaseFilter(phase) {
        currentPhaseFilter = phase;
        renderFilters();
        renderScreens();
    }
    
    function renderScreens() {
        let filtered = screensDB;
        if(currentTeamFilter !== "all") filtered = filtered.filter(s => s.assign === currentTeamFilter);
        if(currentPhaseFilter !== "all") filtered = filtered.filter(s => s.phase === currentPhaseFilter);
        
        const container = document.getElementById("screensContainer");
        if(filtered.length === 0) {
            container.innerHTML = `<div class="text-center p-16 bg-white rounded-3xl shadow"><i class="fa-regular fa-face-frown text-6xl text-gray-400"></i><p class="mt-4">لا توجد شاشات تطابق الفلتر</p></div>`;
            return;
        }
        
        // تجميع حسب المرحلة لعرضها بشكل منظم (حتى مع الفلتر)
        const phases = { phase1: [], phase2: [], phase3: [] };
        filtered.forEach(s => { if(phases[s.phase]) phases[s.phase].push(s); });
        
        let html = '';
        for(let [phaseKey, screensList] of Object.entries(phases)) {
            if(screensList.length === 0) continue;
            let phaseTitle = "";
            if(phaseKey === "phase1") phaseTitle = "✨ المرحلة 1 : شاشات البداية والمصادقة (Splash, Onboarding, Auth)";
            if(phaseKey === "phase2") phaseTitle = "⚙️ المرحلة 2 : قلب التطبيق (Acheteur / Vendeur / Préparateur)";
            if(phaseKey === "phase3") phaseTitle = "🚀 المرحلة 3 : نظام التوصيل + الإدارة الكامل (Livreur + Admin Web)";
            html += `<div class="mb-12"><div class="phase-header pr-4 mb-5"><h2 class="text-2xl font-black text-slate-800 inline-block bg-white px-5 py-2 rounded-full shadow-sm">${phaseTitle} <span class="text-emerald-600 text-lg">(${screensList.length} شاشة)</span></h2></div><div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">`;
            screensList.forEach(screen => {
                html += `
                    <div class="screen-card bg-white rounded-2xl overflow-hidden shadow-md cursor-pointer hover:shadow-xl" onclick='showTechModal(${JSON.stringify(screen).replace(/'/g, "&#39;")})'>
                        <div class="relative">
                            <img src="${screen.src}" class="w-full aspect-[9/16] object-cover bg-gray-100" alt="${screen.title}" onerror="this.src='https://placehold.co/300x500?text=${encodeURIComponent(screen.title)}'">
                            <div class="absolute top-2 right-2 bg-black/60 text-white text-[10px] px-2 py-1 rounded-full">${screen.assign}</div>
                        </div>
                        <div class="p-3">
                            <p class="font-bold text-sm">${screen.title}</p>
                            <div class="flex justify-between items-center mt-1 text-xs text-emerald-700">
                                <span><i class="fa-regular fa-folder-open"></i> ${screen.type}</span>
                                <span class="bg-slate-100 px-2 py-0.5 rounded-full">${screen.phase.toUpperCase()}</span>
                            </div>
                        </div>
                    </div>
                `;
            });
            html += `</div></div>`;
        }
        container.innerHTML = html;
    }
    
    // عرض المودال التقني
    window.showTechModal = function(screen) {
        document.getElementById("modalTitle").innerText = screen.title;
        document.getElementById("modalImg").src = screen.src;
        document.getElementById("modalDesc").innerText = screen.desc;
        document.getElementById("modalAssignee").innerHTML = `<i class="fa-regular fa-user"></i> ${screen.assign}`;
        let phaseLabel = screen.phase === "phase1" ? "المرحلة 1 - البداية والمصادقة" : (screen.phase === "phase2" ? "المرحلة 2 - العمليات الأساسية" : "المرحلة 3 - التوصيل والإدارة");
        document.getElementById("modalPhaseTag").innerHTML = `<i class="fa-regular fa-calendar"></i> ${phaseLabel}`;
        const techDiv = document.getElementById("modalTechStack");
        techDiv.innerHTML = screen.tech.map(t => `<span class="bg-emerald-100 text-emerald-800 px-3 py-1 rounded-full text-xs font-bold"><i class="fa-solid fa-code"></i> ${t}</span>`).join("");
        const libDiv = document.getElementById("modalLibraries");
        libDiv.innerHTML = screen.libs.map(l => `<span class="bg-slate-100 text-slate-700 px-3 py-1 rounded-full text-xs"><i class="fa-regular fa-gem"></i> ${l}</span>`).join("");
        document.getElementById("modalFlow").innerText = screen.flow;
        document.getElementById("techModal").classList.remove("hidden");
        document.getElementById("techModal").style.display = "flex";
    };
    
    window.closeTechModal = function() {
        document.getElementById("techModal").style.display = "none";
        document.getElementById("techModal").classList.add("hidden");
    };
    
    function init() {
        renderPhaseStats();
        renderFilters();
        renderScreens();
    }
    
    init();
</script>
</body>
</html>
