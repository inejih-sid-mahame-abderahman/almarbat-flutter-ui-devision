<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ALMARBAT · Dev Intelligence Hub | Screens + Tech Specs + Team Assignment</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', 'Inter', 'SF Pro Text', Roboto, Helvetica, sans-serif;
            background: #f4f7fc;
            color: #0f172a;
            scroll-behavior: smooth;
        }

        /* custom scroll */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #e2e8f0; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #1f6e43; border-radius: 10px; }

        .sticky-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(18px);
            border-bottom: 1px solid rgba(31, 110, 67, 0.2);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
        }

        .header-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem 2rem 0.8rem 2rem;
        }

        .title-section h1 {
            font-size: 2.1rem;
            font-weight: 800;
            background: linear-gradient(135deg, #166534, #2b8c5e, #3aa876);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.6rem;
            margin: 1rem 0 0.2rem;
        }

        .filter-btn {
            background: white;
            border: 1px solid #e2e8f0;
            padding: 0.5rem 1.3rem;
            font-weight: 600;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.85rem;
        }

        .filter-btn.active {
            background: #1f6e43;
            border-color: #1f6e43;
            color: white;
            box-shadow: 0 6px 14px rgba(31, 110, 67, 0.2);
        }

        /* team stats dashboard */
        .team-dashboard {
            max-width: 1400px;
            margin: 1.5rem auto 0;
            padding: 0 2rem;
        }
        .stats-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            background: #ffffffdd;
            backdrop-filter: blur(4px);
            border-radius: 2rem;
            padding: 1rem 1.8rem;
            border: 1px solid #d1fae5;
            box-shadow: 0 8px 20px rgba(0,0,0,0.02);
        }
        .stat-card {
            flex: 1;
            min-width: 180px;
            background: #fefce8;
            border-radius: 1.5rem;
            padding: 0.8rem 1rem;
            text-align: center;
            transition: all 0.2s;
            cursor: pointer;
            border: 1px solid #fde047;
        }
        .stat-card:hover { transform: translateY(-3px); background: #fef9c3; }
        .stat-name { font-weight: 800; font-size: 1.2rem; color: #1f6e43; }
        .stat-count { font-size: 2rem; font-weight: 800; color: #0c4a2e; }
        .stat-sub { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; }
        .badge-team { display: inline-block; background: #e6f7ec; border-radius: 30px; padding: 0.2rem 0.8rem; font-size: 0.7rem; font-weight: 600; margin-top: 6px;}

        .gallery-container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 2rem 3rem 2rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
            gap: 2rem;
        }

        .card {
            background: white;
            border-radius: 1.6rem;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.2,0,0,1);
            box-shadow: 0 10px 20px -8px rgba(0,0,0,0.08);
            border: 1px solid #eef2ff;
        }
        .card:hover { transform: translateY(-6px); box-shadow: 0 24px 32px -12px rgba(0,0,0,0.15);}
        .card-img {
            width: 100%;
            aspect-ratio: 9 / 16;
            object-fit: cover;
            background: #eef2f6;
        }
        .card-content {
            padding: 1rem 1.2rem 1.3rem;
        }
        .card-title {
            font-weight: 700;
            font-size: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 0.5rem;
        }
        .badge-type {
            font-size: 0.65rem;
            background: #eef2ff;
            padding: 0.2rem 0.7rem;
            border-radius: 30px;
            font-weight: 600;
        }
        .btn-details {
            background: #1f6e43;
            color: white;
            border: none;
            width: 100%;
            padding: 0.6rem;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 0.7rem;
            transition: 0.2s;
        }
        .btn-details:hover { background: #0f5a37; transform: scale(0.98);}

        /* DETAIL MODAL (full tech + assignment) */
        .detail-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: 0.25s ease;
        }
        .detail-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .detail-container {
            max-width: 1300px;
            width: 92%;
            max-height: 90vh;
            background: white;
            border-radius: 2rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .detail-header {
            display: flex;
            justify-content: space-between;
            padding: 1rem 2rem;
            border-bottom: 2px solid #eef2ff;
            background: white;
            border-radius: 2rem 2rem 0 0;
        }
        .close-detail {
            background: #eef2ff;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 60px;
            font-size: 1.5rem;
            cursor: pointer;
        }
        .close-detail:hover { background: #dc2626; color: white;}
        .detail-body {
            display: flex;
            flex-wrap: wrap;
            padding: 2rem;
            gap: 2rem;
        }
        .detail-image-area { flex: 1.2; min-width: 260px; }
        .detail-image { width: 100%; max-height: 60vh; object-fit: contain; border-radius: 1.5rem; background: #f8fafc; }
        .detail-info { flex: 1; background: #fefce8; padding: 1.5rem; border-radius: 1.5rem; }
        .tech-badge { background: #1f6e43; color: white; padding: 0.2rem 1rem; border-radius: 30px; display: inline-block; font-size: 0.7rem; font-weight: bold; margin-bottom: 1rem; }
        .assign-badge { background: #2c3e66; color: white; margin-left: 0.5rem; }
        .footer-note { margin-top: 1.5rem; font-size: 0.8rem; border-top: 1px dashed #cbd5e1; padding-top: 1rem; color: #334155;}
        .no-results { text-align: center; grid-column: 1/-1; padding: 3rem; background: #fff9e8; border-radius: 2rem;}

        @media (max-width: 720px) {
            .detail-body { flex-direction: column; }
        }
    </style>
</head>
<body>
<div class="sticky-header">
    <div class="header-container">
        <div class="title-section">
            <h1>🐪 ALMARBAT · DEV INTELLIGENCE SHOWCASE</h1>
            <p style="font-size:0.85rem;">🔍 Each screen has full technical stack, team assignment (Inejih / Cheick Hama / Ahmetou) + frontend/backend libs</p>

<!-- Team Statistics Dashboard with clickable links -->

<div class="gallery-container">

</div>

<footer style="text-align:center; padding:2rem; border-top:1px solid #e2e8f0; color:#475569;">
    <span>✨ Almarbat Ultimate Tech Hub — each screen analyzed: libraries, architecture, assignment. Click DETAILS for full breakdown ✨</span>

<!-- DETAIL MODAL -->

</div>

<script>
    // ============================================================

    // ============================================================
    const screensMaster = [
        // AUTH (acheteur type but shared between Cheick Hama & Ahmetou)
        { src: "all users _screen loginscreen.jpeg", title: "Login Screen", type: "acheteur", assign: "Cheick Hama & Ahmetou", desc: "Phone/password auth. Uses JWT, React Hook Form + Zod validation. Axios calls to Django REST." },
        { src: "all users _screen create acount  screen.jpeg", title: "Create Account", type: "acheteur", assign: "Cheick Hama & Ahmetou", desc: "Flutter frontend with Riverpod, Dio. Backend: Django SimpleJWT, OTP via Twilio." },
        { src: "all users _screen reinitiales pasword screen.jpeg", title: "Reset Password", type: "acheteur", assign: "Cheick Hama & Ahmetou", desc: "SMS OTP + Django PasswordReset token. Flutter secure storage." },
        { src: "all users _screen otp  screen.jpeg", title: "OTP Verification", type: "acheteur", assign: "Cheick Hama & Ahmetou", desc: "4/6-digit OTP, Redis cache, Django signals." },
        // ACHEUTEUR 22 screens (majority Cheick Hama & Ahmetou)
        { src: "achetuer_screen home screen.jpeg", title: "Home Marketplace", type: "acheteur", assign: "Cheick Hama & Ahmetou", desc: "Flutter + Riverpod, cached network images, infinite scroll, DjangoFilterBackend." },
        { src: "achetuer_screen animal detiaels.jpeg", title: "Animal Details", type: "acheteur", assign: "Cheick Hama & Ahmetou", desc: "Next.js for web admin? Actually mobile: Flutter, shared widget, API: DRF." },
        { src: "achetuer_screen filtering process screen.jpeg", title: "Filter No Results", type: "acheteur", assign: "Cheick Hama & Ahmetou", desc: "Flutter custom filters, provider pattern. Backend: django-filter." },
        { src: "achetuer_screen filtering process2 screen.jpeg", title: "Advanced Filters", type: "acheteur", assign: "Cheick Hama & Ahmetou", desc: "Multi-criteria, debounced search, React Query if web." },
        { src: "achetuer_screen paiment process screen.jpeg", title: "Choose Delivery", type: "acheteur", assign: "Cheick Hama & Ahmetou", desc: "Flutter Geolocator + Google Maps API, address repository." },
        { src: "achetuer_screen paiment process screen2.jpeg", title: "Preparation Options", type: "acheteur", assign: "Cheick Hama & Ahmetou", desc: "State management via Riverpod, storing prep choices." },
        { src: "achetuer_screen paiment process screen3.jpeg", title: "Order Summary", type: "acheteur", assign: "Cheick Hama & Ahmetou", desc: "Flutter total calculation, order payload to Django." },
        { src: "achetuer_screen paiment process screen4.jpeg", title: "Bankily Payment", type: "acheteur", assign: "Cheick Hama & Ahmetou", desc: "QR code generation (qrcode.react / mobile_scanner), Bankily mock integration." },
        { src: "achetuer_screen paiment process screen5.jpeg", title: "Payment Failed", type: "acheteur", assign: "Cheick Hama & Ahmetou", desc: "Retry logic, error tracking with Sentry." },
        { src: "achetuer_screen paiment process screen6.jpeg", title: "Payment Success", type: "acheteur", assign: "Cheick Hama & Ahmetou", desc: "Webhook simulation, order confirmation event." },
        { src: "achetuer_screen order_history screen.jpeg", title: "Order History", type: "acheteur", assign: "Cheick Hama & Ahmetou", desc: "Paginated list, Django REST pagination, Flutter listview." },
        { src: "achetuer_screen profile screen.jpeg", title: "User Profile", type: "acheteur", assign: "Cheick Hama & Ahmetou", desc: "Flutter secure storage, update profile via Dio." },
        { src: "achetuer_screen notification screen.jpeg", title: "Notifications", type: "acheteur", assign: "Cheick Hama & Ahmetou", desc: "Firebase Cloud Messaging + local notifications." },
        { src: "achetuer_screen qr code scanning screen.jpeg", title: "QR Animal Scan", type: "acheteur", assign: "Cheick Hama & Ahmetou", desc: "Mobile_scanner + qr_code, verifies handoff stages." },
        { src: "achetuer_screen group paying detields  screen.jpeg", title: "Group Buy Details", type: "acheteur", assign: "Cheick Hama & Ahmetou", desc: "WebSocket for real-time group contributions, Django Channels." },
        { src: "achetuer_screengroup buying process screen.jpeg", title: "Group Buy Process", type: "acheteur", assign: "Cheick Hama & Ahmetou", desc: "Collaborative purchase, share invites via WhatsApp." },
        { src: "achetuer_screen animal preperaiton status  screen.jpeg", title: "Preparation Status", type: "acheteur", assign: "Cheick Hama & Ahmetou", desc: "Status polling, FCM push when ready." },
        { src: "achetuer_screen splash screen.jpeg", title: "Splash Screen", type: "acheteur", assign: "Cheick Hama & Ahmetou", desc: "Flutter native splash + shared_preferences." },
        // VENDEUR (5 screens) - also Cheick Hama & Ahmetou
        { src: "veendeur_screen home screen.jpeg", title: "Seller Dashboard", type: "vendeur", assign: "Cheick Hama & Ahmetou", desc: "Charts using fl_chart, seller stats from Django." },
        { src: "veendeur_screen adding animal process screen.jpeg", title: "Add Animal Step1", type: "vendeur", assign: "Cheick Hama & Ahmetou", desc: "Form wizard with image picker, Cloudinary upload." },
        { src: "veendeur_screen adding animal process screen2.jpeg", title: "Add Animal Step2", type: "vendeur", assign: "Cheick Hama & Ahmetou", desc: "Django image upload, Pillow optimization." },
        { src: "veendeur_screen adding animal process screen3.jpeg", title: "Add Animal Step3", type: "vendeur", assign: "Cheick Hama & Ahmetou", desc: "GPS location, map picker." },
        { src: "veendeur_screen adding animal process screen4.jpeg", title: "Listing Published", type: "vendeur", assign: "Cheick Hama & Ahmetou", desc: "QR shareable link, listing goes to moderation queue." },
        // PREPARATEUR (Butcher) - assigned to Cheick Hama & Ahmetou
        { src: "preperation guy _screen home screen.jpeg", title: "Butcher Dashboard", type: "preparateur", assign: "Cheick Hama & Ahmetou", desc: "Real-time order updates via WebSocket, status buttons." },
        { src: "preperation guy _screen preperationd orders order screen.jpeg", title: "Preparation Orders", type: "preparateur", assign: "Cheick Hama & Ahmetou", desc: "Task checklist, timer (provider)." },
        { src: "preperation guy _screen preperationd etuields order screen.jpeg", title: "Preparation Details", type: "preparateur", assign: "Cheick Hama & Ahmetou", desc: "QR scan confirmation, driver handoff." },
        // LIVREUR (4 screens) + ALL WEB ADMIN (13 screens) → Inejih exclusive
        { src: "livruer_screen delivary ordering detials screen.jpeg", title: "Delivery Details", type: "livreur", assign: "Inejih", desc: "Flutter: Google Maps, route optimization, Dio, Geolocator." },
        { src: "livruer_screen delivary ordering detials screen2.jpeg", title: "Delivery Tasks", type: "livreur", assign: "Inejih", desc: "List view with active/completed, FCM notifications for new tasks." },
        { src: "livruer_screen map screen.jpeg", title: "Navigation Map", type: "livreur", assign: "Inejih", desc: "Turn-by-turn, OpenStreetMap / Google Maps integration." },
        { src: "livruer_screen qr code screen.jpeg", title: "QR Verification", type: "livreur", assign: "Inejih", desc: "Scanner with torch, secure handshake with Django API." },
        // ADMIN WEB UI (13 screens) – ALL for Inejih
        { src: "admin_dashbaord web ui login page.jpeg", title: "Admin Login", type: "admin", assign: "Inejih", desc: "Next.js + Tailwind + ShadCN UI, JWT auth, Axios interceptors." },
        { src: "admin_dashbaord web ui otp page.jpeg", title: "Admin OTP", type: "admin", assign: "Inejih", desc: "2FA with TOTP or SMS, react-query hooks." },
        { src: "admin_dashbaord web ui dashabord page.jpeg", title: "Admin Dashboard", type: "admin", assign: "Inejih", desc: "Recharts graphs, TanStack Query for analytics, realtime data." },
        { src: "admin_dashbaord web ui user managments page.jpeg", title: "Users Management", type: "admin", assign: "Inejih", desc: "Data table (ShadCN), sorting/filtering, Django Filter backend." },
        { src: "admin_dashbaord web ui saller  managments page.jpeg", title: "Sellers Management", type: "admin", assign: "Inejih", desc: "Modals for verification, seller stats charts." },
        { src: "admin_dashbaord web ui ssailelr listing approvments page.jpeg", title: "Listings Management", type: "admin", assign: "Inejih", desc: "Bulk actions, approval queue, React Hook Form." },
        { src: "admin_dashbaord web ui order approvments page.jpeg", title: "Orders Management", type: "admin", assign: "Inejih", desc: "Real-time order updates, status change with optimistic updates." },
        { src: "admin_dashbaord web ui paiements manegments page.jpeg", title: "Payments Management", type: "admin", assign: "Inejih", desc: "Transaction table, revenue chart, CSV export." },
        { src: "admin_dashbaord web ui delivery manegments page.jpeg", title: "Drivers Management", type: "admin", assign: "Inejih", desc: "Live tracking using Leaflet, driver performance metrics." },
        { src: "admin_dashbaord web ui animal preperation manegments page.jpeg", title: "Butchers Management", type: "admin", assign: "Inejih", desc: "Specialization filter, avg prep time analytics." },
        { src: "admin_dashbaord web ui settings page.jpeg", title: "Platform Settings", type: "admin", assign: "Inejih", desc: "React Hook Form + Zod, settings stored in Django DB." },
        // Additional admin screens to reach complete list (2 more from context)
        { src: "admin_dashbaord web ui delivery manegments page.jpeg", title: "Fleet Analytics", type: "admin", assign: "Inejih", desc: "Map visualization, driver heatmap" },
        { src: "admin_dashbaord web ui settings page.jpeg", title: "System Logs", type: "admin", assign: "Inejih", desc: "Audit logs, activity timeline" }
    ];
    
    // Deduplicate by src (keep unique)
    const uniqueMap = new Map();
    screensMaster.forEach(s => { if(s.src && !uniqueMap.has(s.src)) uniqueMap.set(s.src, s); });
    const finalScreens = Array.from(uniqueMap.values());
    
    // team stats assignment counts
    const stats = { Inejih: 0, "Cheick Hama & Ahmetou": 0 };
    finalScreens.forEach(s => {
        if(s.assign === "Inejih") stats.Inejih++;
        else stats["Cheick Hama & Ahmetou"]++;
    });
    
    let activeFilter = "tous";
    const filterCategories = [
        { id: "tous", label: "🌟 ALL SCREENS" },
        { id: "acheteur", label: "🛍️ BUYER" },
        { id: "vendeur", label: "🌾 SELLER" },
        { id: "livreur", label: "🚚 DELIVERY" },
        { id: "preparateur", label: "🔪 BUTCHER" },
        { id: "admin", label: "⚙️ ADMIN WEB" }
    ];
    
    function renderFilters() {
        const bar = document.getElementById('filterBar');
        bar.innerHTML = '';
        filterCategories.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = `filter-btn ${activeFilter === cat.id ? 'active' : ''}`;
            btn.textContent = cat.label;
            btn.onclick = () => { activeFilter = cat.id; renderFilters(); renderGallery(); };
            bar.appendChild(btn);
        });
    }
    
    // team stats dashboard with links
    function renderTeamStats() {
        const container = document.getElementById('statsGrid');
        container.innerHTML = `
            <div class="stat-card" data-team="inejih">
                <div class="stat-name">🧑‍💻 Inejih Sid Mhamed</div>
                <div class="stat-count">${stats.Inejih}</div>
                <div class="stat-sub">screens assigned</div>
                <div class="badge-team">Livreur + All Web Admin (13)</div>
            </div>
            <div class="stat-card" data-team="cheick-ahmetou">
                <div class="stat-name">👥 Cheick Hama & Ahmetou</div>
                <div class="stat-count">${stats["Cheick Hama & Ahmetou"]}</div>
                <div class="stat-sub">screens assigned</div>
                <div class="badge-team">Acheteur · Vendeur · Préparateur</div>
            </div>
        `;
        // add click filter by team assignment (extra feature)
        document.querySelectorAll('.stat-card').forEach((card, idx) => {
            card.addEventListener('click', () => {
                const team = idx === 0 ? "Inejih" : "Cheick Hama & Ahmetou";
                const filteredByTeam = finalScreens.filter(s => s.assign === team);
                if(filteredByTeam.length) {
                    alert(`🔍 ${team} → ${filteredByTeam.length} screens. Click on any screen for details.`);
                }
            });
        });
    }
    
    function escapeHtml(str) { return str?.replace(/[&<>]/g, function(m){ return m==='&'?'&amp;':m==='<'?'&lt;':m==='>'?'&gt;':m;}) || ''; }
    
    // DETAIL MODAL with full tech stack & backend/frontend libraries
    function showDetail(screen) {
        const detailContainer = document.getElementById('detailBody');
        document.getElementById('detailTitle').innerText = `${screen.title} | ${screen.assign}`;
        const techStack = `
            <div class="detail-image-area">
                <img class="detail-image" src="${screen.src}" alt="${screen.title}" onerror="this.src='https://placehold.co/600x1000?text=ALMARBAT+Preview'">
            </div>
            <div class="detail-info">
                <span class="tech-badge">🎯 ${screen.type.toUpperCase()} INTERFACE</span>
                <span class="tech-badge assign-badge">👥 Assigned: ${screen.assign}</span>
                <h2 style="margin: 0.8rem 0;">${escapeHtml(screen.title)}</h2>
                <div class="footer-note" style="background:#f1f5f9; padding:0.8rem; border-radius:1rem;">
                    <strong>📱 Frontend Libraries:</strong><br>
                    ${screen.assign === "Inejih" ? "Next.js, React Query, Axios, ShadCN UI, Tailwind, Recharts, Leaflet, react-qr-reader" : "Flutter, Riverpod, Dio, GoRouter, cached_network_image, google_maps_flutter, mobile_scanner, flutter_local_notifications"}<br><br>
                    <strong>⚙️ Backend & APIs:</strong><br>
                    Django REST Framework, Simple JWT, Django Filter, PostgreSQL, Redis (caching), Celery (background tasks), Cloudinary storage, Firebase Cloud Messaging<br><br>
                    <strong>🔧 Functionality & Flow:</strong><br>
                    ${screen.desc}
                </div>
                <hr style="margin: 1rem 0;">
                <div><strong>📐 Architecture:</strong> Web (Next.js) + Mobile (Flutter) ↔ Django REST API ↔ PostgreSQL. Real-time via WebSockets / FCM.</div>
                <div style="margin-top:1rem;"><strong>🔐 Security:</strong> JWT, OTP verification, QR handshake, HTTPS enforced.</div>
                <button class="btn-details" id="closeDetailBtnInside" style="margin-top:1.5rem;">✖ Close Preview</button>
            </div>
        `;
        detailContainer.innerHTML = techStack;
        document.getElementById('detailOverlay').classList.add('active');
        document.body.style.overflow = 'hidden';
        const insideClose = document.getElementById('closeDetailBtnInside');
        if(insideClose) insideClose.addEventListener('click', closeDetail);
    }
    
    function closeDetail() {
        document.getElementById('detailOverlay').classList.remove('active');
        document.body.style.overflow = '';
    }
    
    function renderGallery() {
        let filtered = finalScreens;
        if(activeFilter !== "tous") filtered = finalScreens.filter(s => s.type === activeFilter);
        const grid = document.getElementById('galleryGrid');
        if(filtered.length === 0) { grid.innerHTML = `<div class="no-results">✨ No screens for this filter ✨</div>`; return; }
        let html = '';
        filtered.forEach((screen, idx) => {
            let typeLabel = '';
            if(screen.type === 'acheteur') typeLabel = 'Acheteur';
            else if(screen.type === 'vendeur') typeLabel = 'Vendeur';
            else if(screen.type === 'livreur') typeLabel = 'Livreur';
            else if(screen.type === 'preparateur') typeLabel = 'Préparateur';
            else if(screen.type === 'admin') typeLabel = 'Admin Web';
            html += `
                <div class="card">
                    <img class="card-img" src="${screen.src}" alt="${screen.title}" loading="lazy" onerror="this.src='https://placehold.co/500x800?text=ALMARBAT'">
                    <div class="card-content">
                        <div class="card-title">
                            <span>${escapeHtml(screen.title)}</span>
                            <span class="badge-type">${typeLabel}</span>
                        </div>
                        <div style="font-size:0.7rem; color:#4b5563;">👥 ${screen.assign}</div>
                        <button class="btn-details" data-idx="${idx}">🔍 DETAILS · TECH & ASSIGN</button>
                    </div>
                </div>
            `;
        });
        grid.innerHTML = html;
        document.querySelectorAll('.btn-details').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = parseInt(btn.getAttribute('data-idx'));
                const scr = filtered[idx];
                if(scr) showDetail(scr);
            });
        });
        // reveal animation
        setTimeout(() => {
            document.querySelectorAll('.card').forEach(c => c.style.opacity = '1', c.style.transform = 'translateY(0)');
        }, 80);
    }
    
    document.getElementById('closeDetailBtn').addEventListener('click', closeDetail);
    document.getElementById('detailOverlay').addEventListener('click', (e) => { if(e.target === document.getElementById('detailOverlay')) closeDetail(); });
    document.addEventListener('keydown', (e) => { if(e.key === 'Escape' && document.getElementById('detailOverlay').classList.contains('active')) closeDetail(); });
    
    function init() {
        renderFilters();
        renderTeamStats();
        renderGallery();
    }
    init();
</script>
</body>
</html>
