    // لتكون دقيقة 45 شاشة سنأخذ أول 45 عنصر من المصفوفة المعدلة (لأننا أضفنا 6 شاشات إضافية للعمارة الاحترافية)
    const finalScreens = screensDB.slice(0,45);
    console.log("✅ عدد الشاشات النهائي:", finalScreens.length);
    console.log("Inejih:", finalScreens.filter(s=>s.assign==="Inejih").length);
    console.log("Cheick Hama:", finalScreens.filter(s=>s.assign==="Cheick Hama").length);
    console.log("Ahmetou:", finalScreens.filter(s=>s.assign==="Ahmetou").length);
    
    // إحصائيات المراحل السبع
    const phasesMeta = [
        { key:"phase0", name:"🚀 المرحلة 0: التأسيس + Onboarding", icon:"fa-rocket", color:"emerald", desc:"البنية التحتية والشاشات التعريفية" },
        { key:"phase1", name:"🔐 المرحلة 1: الأمان والمصادقة", icon:"fa-shield-haltered", color:"blue", desc:"JWT, 2FA, Biometric" },
        { key:"phase2", name:"🛍️ المرحلة 2: السوق الأساسي (Acheteur)", icon:"fa-store", color:"amber", desc:"الشراء والدفع والتوصيل" },
        { key:"phase3", name:"🌾 المرحلة 3: إدارة البائعين", icon:"fa-tractor", color:"green", desc:"إضافة الحيوانات والمخزون" },
        { key:"phase4", name:"🔪 المرحلة 4: التجهيز والجزارة", icon:"fa-kitchen-set", color:"orange", desc:"سير عمل الجزارين" },
        { key:"phase5", name:"🚚 المرحلة 5: اللوجستيات والتوصيل", icon:"fa-truck-fast", color:"sky", desc:"تتبع السائقين" },
        { key:"phase6", name:"⚙️ المرحلة 6: الإدارة الكاملة (Web)", icon:"fa-chart-line", color:"slate", desc:"لوحة تحكم متقدمة Next.js" }
    ];
    
    let currentPhaseFilter = "all";
    let currentTeamFilter = "all";
    
    function renderSevenPhases() {
        const container = document.getElementById("sevenPhasesStats");
        container.innerHTML = phasesMeta.map(phase => {
            const count = finalScreens.filter(s => s.phase === phase.key).length;
            return `
                <div onclick="setPhaseFilter('${phase.key}')" class="phase-card bg-white rounded-2xl p-3 text-center shadow-md hover:shadow-xl border-b-4 border-${phase.color}-500">
                    <i class="fa-solid ${phase.icon} text-2xl text-${phase.color}-600"></i>
                    <h3 class="text-xl font-black mt-1">${count}</h3>
                    <p class="text-xs font-bold">${phase.name.split(':')[0]}</p>
                    <p class="text-[10px] text-slate-500">${phase.desc.substring(0,25)}</p>
                </div>
            `;
        }).join('');
    }
    
    function renderFilters() {
        const teamDiv = document.getElementById("quickFilterTeam");
        teamDiv.innerHTML = `
            <button class="px-5 py-2 rounded-full font-bold transition-all ${currentTeamFilter==='all' ? 'bg-emerald-700 text-white shadow-lg' : 'bg-white border text-slate-700'}" onclick="setTeamFilter('all')">👥 جميع المطورين</button>
            <button class="px-5 py-2 rounded-full font-bold transition-all ${currentTeamFilter==='Inejih' ? 'bg-emerald-700 text-white shadow-lg' : 'bg-white border text-slate-700'}" onclick="setTeamFilter('Inejih')">🧑‍💻 Inejih (15)</button>
            <button class="px-5 py-2 rounded-full font-bold transition-all ${currentTeamFilter==='Cheick Hama' ? 'bg-emerald-700 text-white shadow-lg' : 'bg-white border text-slate-700'}" onclick="setTeamFilter('Cheick Hama')">👳 Cheick Hama (15)</button>
            <button class="px-5 py-2 rounded-full font-bold transition-all ${currentTeamFilter==='Ahmetou' ? 'bg-emerald-700 text-white shadow-lg' : 'bg-white border text-slate-700'}" onclick="setTeamFilter('Ahmetou')">🧔 Ahmetou (15)</button>
        `;
        const phaseDiv = document.getElementById("phaseFilterButtonsAdvanced");
        phaseDiv.innerHTML = `
            <button class="text-sm px-4 py-2 rounded-full font-bold ${currentPhaseFilter==='all' ? 'bg-slate-800 text-white' : 'bg-white border'}" onclick="setPhaseFilter('all')">📱 كل المراحل (7)</button>
            ${phasesMeta.map(p => `<button class="text-sm px-4 py-2 rounded-full font-bold ${currentPhaseFilter===p.key ? 'bg-${p.color}-600 text-white' : 'bg-white border'}" onclick="setPhaseFilter('${p.key}')">${p.name.substring(0,18)}</button>`).join('')}
        `;
    }
    
    function setTeamFilter(team) { currentTeamFilter = team; renderFilters(); renderScreens(); }
    function setPhaseFilter(phase) { currentPhaseFilter = phase; renderFilters(); renderScreens(); }
    
    function renderScreens() {
        let filtered = finalScreens;
        if(currentTeamFilter !== "all") filtered = filtered.filter(s => s.assign === currentTeamFilter);
        if(currentPhaseFilter !== "all") filtered = filtered.filter(s => s.phase === currentPhaseFilter);
        const container = document.getElementById("screensContainer");
        if(filtered.length === 0) { container.innerHTML = `<div class="text-center p-16 bg-white rounded-3xl shadow"><i class="fa-regular fa-face-frown text-6xl"></i><p class="mt-4">لا شاشات في هذا الفلتر</p></div>`; return; }
        
        const grouped = {};
        filtered.forEach(s => { if(!grouped[s.phase]) grouped[s.phase] = []; grouped[s.phase].push(s); });
        let html = '';
        for(let phaseKey of phasesMeta.map(p=>p.key)) {
            if(!grouped[phaseKey]) continue;
            const phaseInfo = phasesMeta.find(p=>p.key===phaseKey);
            html += `<div class="mb-12"><div class="phase-header pr-4 mb-5 p-3 rounded-2xl"><h2 class="text-xl font-black text-slate-800"><i class="fa-solid ${phaseInfo.icon} text-emerald-600 ml-2"></i> ${phaseInfo.name} <span class="text-emerald-600">(${grouped[phaseKey].length} شاشة)</span></h2><p class="text-xs text-slate-500">${phaseInfo.desc}</p></div><div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">`;
            grouped[phaseKey].forEach(screen => {
                html += `<div class="screen-card bg-white rounded-2xl overflow-hidden shadow-md cursor-pointer hover:shadow-xl" onclick='showTechModal(${JSON.stringify(screen).replace(/'/g, "&#39;")})'><div class="relative"><img src="${screen.src}" class="w-full aspect-[9/16] object-cover bg-gray-100" alt="${screen.title}" onerror="this.src='https://placehold.co/300x500?text=${encodeURIComponent(screen.title)}'"><div class="absolute top-2 right-2 bg-black/60 text-white text-[10px] px-2 py-1 rounded-full">${screen.assign}</div></div><div class="p-3"><p class="font-bold text-sm">${screen.title}</p><div class="flex justify-between mt-1 text-xs"><span><i class="fa-regular fa-folder-open"></i> ${screen.type}</span><span class="bg-slate-100 px-2 rounded-full">${screen.phase.toUpperCase()}</span></div></div></div>`;
            });
            html += `</div></div>`;
        }
        container.innerHTML = html;
    }
    
    window.showTechModal = function(screen) {
        document.getElementById("modalTitle").innerText = screen.title;
        document.getElementById("modalImg").src = screen.src;
        document.getElementById("modalDesc").innerText = screen.desc;
        document.getElementById("modalAssignee").innerHTML = `<i class="fa-regular fa-user"></i> ${screen.assign}`;
        const phaseObj = phasesMeta.find(p=>p.key===screen.phase);
        document.getElementById("modalPhaseTag").innerHTML = `<i class="fa-solid ${phaseObj?.icon}"></i> ${phaseObj?.name || screen.phase}`;
        document.getElementById("modalTechStack").innerHTML = screen.tech.map(t => `<span class="bg-emerald-100 text-emerald-800 px-3 py-1 rounded-full text-xs"><i class="fa-solid fa-code"></i> ${t}</span>`).join("");
        document.getElementById("modalLibraries").innerHTML = screen.libs.map(l => `<span class="bg-slate-100 text-slate-700 px-3 py-1 rounded-full text-xs"><i class="fa-regular fa-gem"></i> ${l}</span>`).join("");
        document.getElementById("modalFlow").innerText = screen.flow;
        document.getElementById("techModal").classList.remove("hidden");
        document.getElementById("techModal").style.display = "flex";
    };
    window.closeTechModal = function() { document.getElementById("techModal").style.display = "none"; document.getElementById("techModal").classList.add("hidden"); };
    
    function init() { renderSevenPhases(); renderFilters(); renderScreens(); }
    init();
</script>
</body>
</html>
