    let currentPhaseFilter = "all";
    let currentTeamFilter = "all";

    function renderSevenPhases() {
        const container = document.getElementById("sevenPhasesStats");
        container.innerHTML = phasesMeta.map(phase => {
            const count = screensDB.filter(s => s.phase === phase.key).length;
            return `
                <div onclick="setPhaseFilter('${phase.key}')" class="phase-card bg-white rounded-2xl p-3 text-center shadow-md hover:shadow-xl border-b-4 border-${phase.color}-500 cursor-pointer">
                    <i class="fa-solid ${phase.icon} text-2xl text-${phase.color}-600"></i>
                    <h3 class="text-xl font-black mt-1">${count}</h3>
                    <p class="text-xs font-bold">${phase.name.split(':')[0]}</p>
                    <p class="text-[10px] text-slate-500">${phase.desc.substring(0,28)}...</p>
                </div>
            `;
        }).join('');
    }

    function renderFilters() {
        const teamDiv = document.getElementById("quickFilterTeam");
        teamDiv.innerHTML = `
            <button onclick="setTeamFilter('all')" class="px-5 py-2 rounded-full font-bold transition-all ${currentTeamFilter==='all' ? 'bg-emerald-700 text-white shadow-lg' : 'bg-white border text-slate-700'}">👥 جميع المطورين (64)</button>
            <button onclick="setTeamFilter('Inejih')" class="px-5 py-2 rounded-full font-bold transition-all ${currentTeamFilter==='Inejih' ? 'bg-emerald-700 text-white shadow-lg' : 'bg-white border text-slate-700'}">🧑‍💻 Inejih (Admin + Delivery)</button>
            <button onclick="setTeamFilter('Cheick Hama')" class="px-5 py-2 rounded-full font-bold transition-all ${currentTeamFilter==='Cheick Hama' ? 'bg-emerald-700 text-white shadow-lg' : 'bg-white border text-slate-700'}">👳 Cheick Hama</button>
            <button onclick="setTeamFilter('Ahmetou')" class="px-5 py-2 rounded-full font-bold transition-all ${currentTeamFilter==='Ahmetou' ? 'bg-emerald-700 text-white shadow-lg' : 'bg-white border text-slate-700'}">🧔 Ahmetou</button>
        `;

        const phaseDiv = document.getElementById("phaseFilterButtonsAdvanced");
        phaseDiv.innerHTML = `
            <button onclick="setPhaseFilter('all')" class="text-sm px-4 py-2 rounded-full font-bold ${currentPhaseFilter==='all' ? 'bg-slate-800 text-white' : 'bg-white border'}">📱 كل الشاشات (64)</button>
            ${phasesMeta.map(p => `
                <button onclick="setPhaseFilter('${p.key}')" class="text-sm px-4 py-2 rounded-full font-bold ${currentPhaseFilter===p.key ? 'bg-emerald-700 text-white' : 'bg-white border'}">
                    ${p.name.split(':')[0]}
                </button>
            `).join('')}
        `;
    }

    function setTeamFilter(team) {
        currentTeamFilter = team;
        renderFilters();
        renderScreens();
    }

    function setPhaseFilter(phase) {
        currentPhaseFilter = phase;
        renderFilters();
        renderScreens();
    }

    function renderScreens() {
        let filtered = screensDB;
        if (currentTeamFilter !== "all") filtered = filtered.filter(s => s.assign === currentTeamFilter);
        if (currentPhaseFilter !== "all") filtered = filtered.filter(s => s.phase === currentPhaseFilter);

        const container = document.getElementById("screensContainer");
        if (filtered.length === 0) {
            container.innerHTML = `<div class="text-center p-16 bg-white rounded-3xl shadow"><i class="fa-regular fa-face-frown text-6xl text-slate-400"></i><p class="mt-4 text-slate-600">لا توجد شاشات في هذا الفلتر</p></div>`;
            return;
        }

        const grouped = {};
        filtered.forEach(s => {
            if (!grouped[s.phase]) grouped[s.phase] = [];
            grouped[s.phase].push(s);
        });

        let html = '';
        phasesMeta.forEach(phaseInfo => {
            const group = grouped[phaseInfo.key];
            if (!group || group.length === 0) return;

            html += `
                <div class="mb-12">
                    <div class="phase-header pr-4 mb-5 p-4 rounded-2xl">
                        <h2 class="text-xl font-black text-slate-800 flex items-center gap-3">
                            <i class="fa-solid ${phaseInfo.icon} text-emerald-600"></i> 
                            ${phaseInfo.name} 
                            <span class="text-emerald-600 text-base">(${group.length} شاشة)</span>
                        </h2>
                        <p class="text-xs text-slate-500 mt-1">${phaseInfo.desc}</p>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
            `;

            group.forEach(screen => {
                html += `
                    <div class="screen-card bg-white rounded-2xl overflow-hidden shadow-md cursor-pointer hover:shadow-2xl" onclick='showTechModal(${JSON.stringify(screen).replace(/'/g, "\\'")})'>
                        <div class="relative">
                            <img src="${screen.src}" class="w-full aspect-[9/19] object-cover bg-gray-100" alt="${screen.title}" 
                                 onerror="this.src='https://placehold.co/300x570?text=${encodeURIComponent(screen.title)}&font=cairo'">
                            <div class="absolute top-3 right-3 bg-black/70 text-white text-[10px] px-2.5 py-1 rounded-full font-medium">
                                ${screen.assign}
                            </div>
                        </div>
                        <div class="p-4">
                            <p class="font-bold text-sm leading-tight">${screen.title}</p>
                            <div class="flex justify-between text-[10px] text-slate-500 mt-2">
                                <span>${screen.type}</span>
                                <span class="bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded">${screen.phase.toUpperCase()}</span>
                            </div>
                        </div>
                    </div>
                `;
            });

            html += `</div></div>`;
        });

        container.innerHTML = html;
    }

    window.showTechModal = function(screen) {
        document.getElementById("modalTitle").innerText = screen.title;
        document.getElementById("modalImg").src = screen.src || "https://placehold.co/600x1100?text=Screen+Preview";
        document.getElementById("modalDesc").innerText = screen.desc || "شاشة من تطبيق ALMARBAT";
        document.getElementById("modalAssignee").innerHTML = `<i class="fa-regular fa-user"></i> ${screen.assign}`;
        
        const phaseObj = phasesMeta.find(p => p.key === screen.phase);
        document.getElementById("modalPhaseTag").innerHTML = `<i class="fa-solid ${phaseObj?.icon}"></i> ${phaseObj?.name || screen.phase}`;

        document.getElementById("modalTechStack").innerHTML = (screen.tech || ["Flutter"]).map(t => 
            `<span class="bg-emerald-100 text-emerald-800 px-3 py-1 rounded-full text-xs"><i class="fa-solid fa-code"></i> ${t}</span>`
        ).join("");

        document.getElementById("modalLibraries").innerHTML = (screen.libs || []).map(l => 
            `<span class="bg-slate-100 text-slate-700 px-3 py-1 rounded-full text-xs"><i class="fa-regular fa-gem"></i> ${l}</span>`
        ).join("");

        document.getElementById("modalFlow").innerText = screen.flow || "تدفق البيانات الافتراضي";

        const modal = document.getElementById("techModal");
        modal.classList.remove("hidden");
        modal.style.display = "flex";
    };

    window.closeTechModal = function() {
        const modal = document.getElementById("techModal");
        modal.style.display = "none";
        modal.classList.add("hidden");
    };

    function init() {
        renderSevenPhases();
        renderFilters();
        renderScreens();
    }

    init();
</script>
