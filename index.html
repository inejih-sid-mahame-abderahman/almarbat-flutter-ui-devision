                </div>
            </div>
        `;
    });
    html += `</div>`;
    
    document.getElementById("teamPageTitle").innerHTML = person;
    document.getElementById("teamPageContent").innerHTML = html;
    document.getElementById("teamPageModal").classList.remove("hidden");
}

function closeTeamPage() {
    document.getElementById("teamPageModal").classList.add("hidden");
}

// ====================== FILTERS & GALLERY ======================
let currentFilter = "all";

function renderFilters() {
    const types = ["all","acheteur","vendeur","preparateur","livreur","admin"];
    const labels = ["🌍 الكل","🛍️ Acheteur","🌾 Vendeur","🔪 Préparateur","🚚 Livreur","⚙️ Admin Web"];
    const bar = document.getElementById("filterBar");
    bar.innerHTML = types.map((type,i) => `
        <button onclick="setFilter('${type}')" 
                class="px-6 py-3 text-sm font-medium rounded-3xl ${currentFilter===type?'bg-[#1f6e43] text-white shadow-inner':'bg-white border hover:bg-slate-100'}">
            ${labels[i]}
        </button>
    `).join("");
}

function setFilter(f) {
    currentFilter = f;
    renderFilters();
    renderGallery();
}

function filterByTeam(team) {
    currentFilter = team;
    renderFilters();
    renderGallery();
}

function renderGallery() {
    let filtered = screens;
    if (currentFilter !== "all") {
        if (currentFilter === "Inejih") filtered = screens.filter(s => s.assign === "Inejih");
        else if (currentFilter === "Cheick Hama") filtered = screens.filter(s => s.assign === "Cheick Hama");
        else if (currentFilter === "Ahmetou") filtered = screens.filter(s => s.assign === "Ahmetou");
        else filtered = screens.filter(s => s.type === currentFilter);
    }
    
    const grid = document.getElementById("galleryGrid");
    grid.innerHTML = filtered.map(screen => `
        <div class="card bg-white rounded-3xl overflow-hidden shadow-lg cursor-pointer group" onclick="showDetail(${screen.id})">
            <div class="relative">
                <img src="${screen.src}" class="w-full aspect-[9/16] object-cover group-hover:scale-105" alt="${screen.title}">
                <div class="absolute top-3 left-3 px-3 py-1 text-xs font-bold bg-white/90 text-[#1f6e43] rounded-3xl">
                    ${screen.type.toUpperCase()}
                </div>
            </div>
            <div class="p-4">
                <h5 class="font-bold text-base leading-tight mb-1">${screen.title}</h5>
                <div class="flex justify-between items-center text-xs">
                    <span class="text-emerald-700 font-medium">${screen.assign}</span>
                    <button onclick="event.stopImmediatePropagation();showDetail(${screen.id});" 
                            class="text-white bg-[#1f6e43] px-5 py-1 text-xs rounded-3xl flex items-center gap-1">
                        <i class="fa-solid fa-circle-info"></i> تفاصيل
                    </button>
                </div>
            </div>
        </div>
    `).join("");
}

// ====================== DETAIL MODAL ======================
function showDetail(id) {
    const screen = screens.find(s => s.id === id);
    if (!screen) return;
    
    document.getElementById("modalTitle").innerHTML = screen.title;
    document.getElementById("modalImage").src = screen.src;
    document.getElementById("modalTypeBadge").innerHTML = `<i class="fa-solid fa-mobile-screen-button"></i> ${screen.type.toUpperCase()}`;
    document.getElementById("modalAssignBadge").innerHTML = `👤 ${screen.assign}`;
    document.getElementById("modalDesc").innerHTML = screen.desc;
    
    const techHTML = screen.tech.map(t => `<span class="tech-tag"><i class="fa-solid fa-code"></i> ${t}</span>`).join("");
    document.getElementById("techStack").innerHTML = techHTML;
    
    const libHTML = screen.libs.length 
        ? screen.libs.map(l => `<div class="bg-slate-100 text-slate-700 rounded-2xl px-4 py-2 text-xs flex items-center gap-2"><i class="fa-solid fa-cube"></i> ${l}</div>`).join("")
        : `<div class="text-slate-400 text-sm">لا توجد مكتبات إضافية مطلوبة</div>`;
    document.getElementById("libraries").innerHTML = libHTML;
    
    document.getElementById("flowDiagram").innerHTML = `
        <div class="flex items-center justify-center gap-3 text-center">
            <div class="bg-white px-6 py-3 rounded-2xl shadow-inner">Frontend<br><span class="text-[#1f6e43] font-bold">${screen.tech[0] || 'Flutter / Next.js'}</span></div>
            <i class="fa-solid fa-arrow-right text-3xl text-slate-300"></i>
            <div class="bg-white px-6 py-3 rounded-2xl shadow-inner">API<br><span class="text-[#1f6e43] font-bold">Django REST</span></div>
            <i class="fa-solid fa-arrow-right text-3xl text-slate-300"></i>
            <div class="bg-white px-6 py-3 rounded-2xl shadow-inner">Database<br><span class="text-[#1f6e43] font-bold">PostgreSQL</span></div>
        </div>
    `;
    
    document.getElementById("detailModal").classList.remove("hidden");
    document.getElementById("detailModal").classList.add("flex");
}

function closeModal() {
    const modal = document.getElementById("detailModal");
    modal.classList.add("hidden");
    modal.classList.remove("flex");
}

// ====================== INIT ======================
function init() {
    renderTeamStats();
    renderFilters();
    renderGallery();
    
    document.addEventListener('keydown', (e) => {
        if (e.key === "Escape") {
            closeModal();
            document.getElementById("teamPageModal").classList.add("hidden");
        }
    });
}

window.onload = init;
</script>
</body>
</html>
